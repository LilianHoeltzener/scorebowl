<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoreBowl - Affichage public</title>
    <style>
        :root {
            --bg-1: #061327;
            --bg-2: #10284b;
            --text: #eef4ff;
            --muted: #a3b5d3;
            --accent: #22c55e;
            --row-even: rgba(255, 255, 255, 0.04);
            --row-odd: rgba(255, 255, 255, 0.09);
            --podium: rgba(255, 215, 0, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at 10% -10%, rgba(13, 110, 253, 0.35), transparent 40%),
                radial-gradient(circle at 95% 0%, rgba(16, 185, 129, 0.24), transparent 32%),
                linear-gradient(180deg, var(--bg-1), var(--bg-2));
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .display {
            height: 100vh;
            padding: 18px;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 14px;
        }

        .head {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 12px;
            flex-wrap: wrap;
        }

        .title-wrap p {
            margin: 0;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.16rem;
            font-size: 0.75rem;
        }

        .title-wrap h1 {
            margin: 4px 0 0;
            font-size: clamp(2rem, 4.8vw, 3.6rem);
            line-height: 1;
        }

        .stats {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .stat {
            min-width: 170px;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }

        .stat span {
            display: block;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.09rem;
            font-size: 0.75rem;
        }

        .stat strong {
            display: block;
            font-size: 2rem;
            line-height: 1;
            margin-top: 6px;
        }

        .board {
            min-height: 0;
            display: grid;
            grid-template-rows: auto 1fr;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(0, 0, 0, 0.24);
        }

        .head-row,
        .row {
            display: grid;
            grid-template-columns: 78px minmax(240px, 2.1fr) repeat(3, minmax(80px, 0.9fr)) minmax(120px, 1fr);
            gap: 10px;
            align-items: center;
            padding: 10px 14px;
        }

        .head-row {
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            font-size: 0.75rem;
            color: var(--muted);
            border-bottom: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(255, 255, 255, 0.05);
        }

        .viewport {
            min-height: 0;
            overflow: hidden;
            position: relative;
        }

        .rows {
            will-change: transform;
            transform: translateY(0);
            transition: transform 650ms linear;
        }

        .row {
            min-height: 74px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: var(--row-even);
        }

        .row:nth-child(odd) {
            background: var(--row-odd);
        }

        .row.podium {
            background: linear-gradient(90deg, var(--podium), rgba(255, 255, 255, 0.03));
        }

        .rank {
            width: 46px;
            height: 46px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 800;
            background: #f2d168;
            color: #1b2f4d;
        }

        .name {
            font-size: clamp(1rem, 2.4vw, 2rem);
            font-weight: 700;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        .score,
        .total {
            text-align: center;
            font-size: clamp(1rem, 2.2vw, 1.9rem);
            font-weight: 700;
        }

        .total {
            border-radius: 999px;
            padding: 7px 10px;
            background: linear-gradient(135deg, #1ea65c, var(--accent));
        }

        .empty {
            height: 100%;
            display: grid;
            place-items: center;
            text-align: center;
            color: var(--muted);
            font-size: 1.4rem;
            padding: 2rem;
        }

        @media (max-width: 980px) {

            .head-row,
            .row {
                grid-template-columns: 60px minmax(170px, 2fr) repeat(3, minmax(60px, 0.8fr)) minmax(88px, 1fr);
                gap: 8px;
                padding: 8px 10px;
            }

            .row {
                min-height: 60px;
            }

            .rank {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }

            .stat {
                min-width: 132px;
            }

            .stat strong {
                font-size: 1.6rem;
            }
        }
    </style>
</head>

<body>
    <main class="display">
        <section class="head">
            <div class="title-wrap">
                <p>Classement en direct</p>
                <h1>ScoreBowl</h1>
            </div>
            <div class="stats">
                <div class="stat">
                    <span>Participants</span>
                    <strong id="total">0</strong>
                </div>
                <div class="stat">
                    <span>Meilleur score</span>
                    <strong id="best">-</strong>
                </div>
            </div>
        </section>

        <section class="board">
            <div class="head-row">
                <span>Rang</span>
                <span>Participant</span>
                <span>Score 1</span>
                <span>Score 2</span>
                <span>Score 3</span>
                <span>Total</span>
            </div>
            <div class="viewport" id="viewport">
                <div class="rows" id="rows"></div>
            </div>
        </section>
    </main>

    <script>
        const STORAGE_KEY = 'scorebowl_participants';

        const totalEl = document.getElementById('total');
        const bestEl = document.getElementById('best');
        const rowsEl = document.getElementById('rows');
        const viewportEl = document.getElementById('viewport');

        let participants = [];
        let fingerprint = '';
        let ticker = null;
        let currentRowOffset = 0;

        function readData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) {
                    participants = [];
                    return;
                }

                const parsed = JSON.parse(raw);
                const data = Array.isArray(parsed.participants) ? parsed.participants : [];
                participants = data
                    .map((item) => ({
                        id: item.id,
                        name: item.name || 'Participant',
                        score1: Number(item.score1) || 0,
                        score2: Number(item.score2) || 0,
                        score3: Number(item.score3) || 0,
                        total: Number(item.total) || 0,
                        rank: Number(item.rank) || 0
                    }))
                    .sort((a, b) => {
                        if (a.rank && b.rank && a.rank !== b.rank) {
                            return a.rank - b.rank;
                        }
                        if (b.total !== a.total) {
                            return b.total - a.total;
                        }
                        return a.name.localeCompare(b.name, 'fr');
                    });
            } catch (error) {
                participants = [];
                console.error('Lecture des donnees impossible', error);
            }
        }

        function render() {
            totalEl.textContent = participants.length;
            bestEl.textContent = participants.length > 0
                ? Math.max(...participants.map((participant) => participant.total))
                : '-';

            if (participants.length === 0) {
                rowsEl.innerHTML = '<div class="empty">En attente des scores en direct...</div>';
                stopAutoScroll();
                return;
            }

            rowsEl.innerHTML = participants.map((participant) => {
                const rowClass = participant.rank > 0 && participant.rank <= 3 ? 'row podium' : 'row';
                return `
                    <div class="${rowClass}">
                        <span class="rank">${participant.rank || '-'}</span>
                        <span class="name">${escapeHtml(participant.name)}</span>
                        <span class="score">${participant.score1}</span>
                        <span class="score">${participant.score2}</span>
                        <span class="score">${participant.score3}</span>
                        <span class="total">${participant.total}</span>
                    </div>
                `;
            }).join('');

            currentRowOffset = 0;
            rowsEl.style.transform = 'translateY(0px)';
            startAutoScroll();
        }

        function startAutoScroll() {
            stopAutoScroll();

            const firstRow = rowsEl.querySelector('.row');
            if (!firstRow) {
                return;
            }

            const rowHeight = firstRow.getBoundingClientRect().height;
            if (!rowHeight) {
                return;
            }

            const visibleRows = Math.max(1, Math.floor(viewportEl.clientHeight / rowHeight));
            const maxOffset = Math.max(0, participants.length - visibleRows);
            if (maxOffset === 0) {
                return;
            }

            ticker = setInterval(() => {
                currentRowOffset = currentRowOffset >= maxOffset ? 0 : currentRowOffset + 1;
                const translateY = currentRowOffset * rowHeight;
                rowsEl.style.transform = `translateY(-${translateY}px)`;
            }, 1700);
        }

        function stopAutoScroll() {
            if (ticker) {
                clearInterval(ticker);
                ticker = null;
            }
        }

        function refresh() {
            readData();
            const nextFingerprint = JSON.stringify(participants.map((participant) => [
                participant.id,
                participant.name,
                participant.score1,
                participant.score2,
                participant.score3,
                participant.total,
                participant.rank
            ]));

            if (nextFingerprint !== fingerprint) {
                fingerprint = nextFingerprint;
                render();
            }
        }

        function escapeHtml(value) {
            const div = document.createElement('div');
            div.textContent = value;
            return div.innerHTML;
        }

        globalThis.addEventListener('storage', refresh);
        globalThis.addEventListener('resize', startAutoScroll);

        refresh();
        setInterval(refresh, 1000);
    </script>
</body>

</html>
