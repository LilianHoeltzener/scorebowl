<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0056b3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" rx="20" fill="url(#bg)"/>
  
  <!-- Trophy -->
  <g transform="translate(96,96)">
    <!-- Main cup -->
    <ellipse cx="0" cy="-10" rx="30" ry="35" fill="#FFD700"/>
    
    <!-- Base -->
    <rect x="-20" y="20" width="40" height="15" fill="#FFD700"/>
    <rect x="-15" y="35" width="30" height="8" fill="#FFD700"/>
    
    <!-- Handles -->
    <path d="M -30 -5 Q -40 -5 -40 5 Q -40 15 -30 15" 
          stroke="#FFD700" stroke-width="4" fill="none"/>
    <path d="M 30 -5 Q 40 -5 40 5 Q 40 15 30 15" 
          stroke="#FFD700" stroke-width="4" fill="none"/>
    
    <!-- Highlight -->
    <ellipse cx="-8" cy="-15" rx="8" ry="12" fill="#FFF" opacity="0.3"/>
  </g>
  
  <!-- Shadow -->
  <ellipse cx="96" cy="170" rx="60" ry="8" fill="rgba(0,0,0,0.2)"/>
</svg>
